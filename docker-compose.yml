services:
  backend:
    build: ./backend
    ports:
      - "8081:8080"
    env_file:
      - ./backend/.env
    volumes:
      # Persist ChromaDB vector store across container restarts
      - chroma_store:/app/src/rag/chroma_store

  frontend:
    build:
      context: ./frontend
      args:
        # Browser makes requests to this URL — must be reachable from the host machine
        VITE_API_URL: http://localhost:8081
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  chroma_store:
